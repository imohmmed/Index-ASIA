services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: asiamax_store
      POSTGRES_USER: asiamax
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asiamax -d asiamax_store"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "6000:6000"
    environment:
      NODE_ENV: production
      PORT: 6000
      DATABASE_URL: postgresql://asiamax:${DB_PASSWORD:-changeme123}@db:5432/asiamax_store
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build: .
    entrypoint: ["node", "-e", ""]
    command: >
      sh -c "echo 'Waiting for DB...' && sleep 3 && echo 'DB ready'"
    environment:
      DATABASE_URL: postgresql://asiamax:${DB_PASSWORD:-changeme123}@db:5432/asiamax_store
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
